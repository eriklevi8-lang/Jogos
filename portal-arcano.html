<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f0c29">
    <title>Portal Arcano</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-dark: #0f0c29;
            --color-purple: #302b63;
            --color-night: #24243e;
            --color-pink: #ff107a;
            --color-cyan: #00ffff;
            --color-gold: #ffd700;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, var(--color-dark), var(--color-purple), var(--color-night));
            color: white;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Partículas Mágicas */
        #particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            bottom: -20px;
            border-radius: 50%;
            animation: float linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            20% { opacity: 1; }
            80% { opacity: 1; }
            100% { transform: translateY(-100vh) scale(0.5); opacity: 0; }
        }

        /* Layout Principal */
        .app-container {
            position: relative;
            z-index: 10;
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
        }

        /* Header */
        header {
            padding: 3rem 1.5rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15, 12, 41, 0.8);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: sticky;
            top: 0;
            z-index: 20;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon-wrap {
            position: relative;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--color-pink), var(--color-cyan));
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px rgba(255, 16, 122, 0.4);
        }

        .logo-icon-inner {
            position: absolute;
            top: 2px;
            left: 2px;
            right: 2px;
            bottom: 2px;
            background: var(--color-dark);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            font-weight: 900;
            letter-spacing: 2px;
            background: linear-gradient(90deg, #ffffff, rgba(255, 255, 255, 0.6));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .icon-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }
        .icon-btn:active { transform: scale(0.95); }
        .icon-btn svg {
            stroke: var(--color-cyan);
            filter: drop-shadow(0 0 5px rgba(0, 255, 255, 0.5));
        }

        /* Main Content */
        main {
            padding: 2rem 1.5rem 8rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            flex: 1;
            overflow-y: auto;
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-family: 'Cinzel', serif;
            font-size: 1.25rem;
            color: rgba(255, 255, 255, 0.9);
        }
        .section-title svg {
            stroke: var(--color-gold);
            filter: drop-shadow(0 0 5px var(--color-gold));
        }

        /* Cards */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            border-left: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 2rem;
            position: relative;
            overflow: hidden;
        }

        /* Active Card */
        .active-card-wrapper {
            position: relative;
            cursor: pointer;
            transition: transform 0.3s;
        }
        .active-card-wrapper:active {
            transform: scale(0.96);
        }
        
        .active-card-glow {
            position: absolute;
            inset: -4px;
            background: linear-gradient(90deg, var(--color-pink), var(--color-purple), var(--color-cyan));
            border-radius: 2.2rem;
            filter: blur(15px);
            opacity: 0.6;
            transition: opacity 0.5s;
            animation: pulse 3s infinite;
        }
        .active-card-wrapper:hover .active-card-glow { opacity: 1; }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 0.8; }
        }

        .active-card {
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
            text-align: center;
            z-index: 1;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.02));
        }

        .active-card h3 {
            font-family: 'Outfit', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 0.25rem;
        }
        .active-card p {
            font-size: 0.875rem;
            color: rgba(255, 255, 255, 0.7);
        }

        .icon-wrapper {
            position: relative;
            margin-top: 0.5rem;
        }
        .icon-wrapper svg {
            width: 80px;
            height: 80px;
            stroke: var(--color-cyan);
            filter: drop-shadow(0 0 15px rgba(0,255,255,0.8));
            transition: transform 0.3s;
        }
        .active-card-wrapper:hover .icon-wrapper svg {
            transform: scale(1.1);
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            overflow: hidden;
            margin-top: 0.5rem;
        }
        .progress-fill {
            height: 100%;
            width: 33%;
            background: linear-gradient(90deg, var(--color-pink), var(--color-cyan));
            border-radius: 3px;
        }
        .start-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: bold;
            color: var(--color-cyan);
            text-shadow: 0 0 5px rgba(0,255,255,0.5);
        }

        /* Locked Cards */
        .locked-card {
            padding: 1.25rem;
            display: flex;
            align-items: center;
            gap: 1.25rem;
            opacity: 0.5;
            filter: grayscale(60%);
            border-radius: 1.5rem;
        }
        .locked-card .locked-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: 0;
        }
        .locked-icon {
            width: 56px;
            height: 56px;
            border-radius: 1rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 1;
        }
        .locked-icon svg {
            stroke: rgba(255,255,255,0.6);
            width: 24px;
            height: 24px;
        }
        .lock-badge {
            position: absolute;
            top: 6px;
            right: 6px;
            width: 12px;
            height: 12px;
            stroke: rgba(255,255,255,0.4) !important;
        }
        .locked-info {
            z-index: 1;
            flex: 1;
        }
        .locked-info h3 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.125rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }
        .locked-info p {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.5);
        }

        /* Footer */
        footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 1.5rem;
            pointer-events: none;
            z-index: 30;
            display: flex;
            justify-content: center;
        }
        .nav-bar {
            background: rgba(15, 12, 41, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2rem;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-around;
            align-items: center;
            width: 100%;
            max-width: 400px;
            pointer-events: auto;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.5);
        }
        .nav-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            background: none;
            border: none;
            color: rgba(255,255,255,0.4);
            cursor: pointer;
            transition: transform 0.2s, color 0.2s;
        }
        .nav-btn:active { transform: scale(0.95); }
        .nav-btn.active {
            color: var(--color-cyan);
            filter: drop-shadow(0 0 8px rgba(0,255,255,0.4));
        }
        .nav-btn span {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }
        .nav-divider {
            width: 1px;
            height: 32px;
            background: rgba(255,255,255,0.1);
        }

        /* SVGs Base */
        svg {
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
    </style>
</head>
<body>
    <div id="particles"></div>

    <div class="app-container">
        <header>
            <div class="logo-container">
                <div class="logo-icon-wrap">
                    <div class="logo-icon-inner">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="url(#logo-gradient)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <defs>
                                <linearGradient id="logo-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop stop-color="#ff107a" offset="0%" />
                                    <stop stop-color="#00ffff" offset="100%" />
                                </linearGradient>
                            </defs>
                            <path d="M12 2L2 12l10 10 10-10L12 2z" />
                            <circle cx="12" cy="12" r="3" />
                        </svg>
                    </div>
                </div>
                <h1>PORTAL</h1>
            </div>
            <button class="icon-btn">
                <svg width="20" height="20" viewBox="0 0 24 24"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </button>
        </header>

        <main>
            <!-- Craft Match -->
            <div class="active-card-wrapper" onclick="window.location.href='/craft-match.html'">
                <div class="active-card-glow"></div>
                <div class="glass-card active-card">
                    <div class="icon-wrapper" style="font-size:4rem; display:flex; align-items:center; justify-content:center; text-shadow: 0 0 15px rgba(0,255,170,0.8);">
                        ⛏️
                    </div>
                    <div>
                        <h3>Craft Match</h3>
                        <p>Mineração Alquímica</p>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="background: linear-gradient(90deg, #ffd700, #00ffaa);"></div>
                    </div>
                    <span class="start-label" style="color: #00ffaa;">Toque para iniciar</span>
                </div>
            </div>

            <!-- Poção Mix -->
            <div class="glass-card locked-card">
                <div class="locked-overlay"></div>
                <div class="locked-icon">
                    <svg class="lock-badge" viewBox="0 0 24 24"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                    <svg viewBox="0 0 24 24"><path d="M10 2v7.31"></path><path d="M14 9.3V1.99"></path><path d="M8.5 2h7"></path><path d="M14 9.3a6.5 6.5 0 1 1-4 0"></path><path d="M5.5 16h13"></path></svg>
                </div>
                <div class="locked-info">
                    <h3>Poção Mix</h3>
                    <p>Desbloqueia no Nível 5</p>
                </div>
            </div>

            <!-- Runa Master -->
            <div class="glass-card locked-card">
                <div class="locked-overlay"></div>
                <div class="locked-icon">
                    <svg class="lock-badge" viewBox="0 0 24 24"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                    <svg viewBox="0 0 24 24"><path d="M6 3h12l4 6-10 13L2 9Z"></path><path d="M11 3 8 9l4 13"></path><path d="M2 9h20"></path></svg>
                </div>
                <div class="locked-info">
                    <h3>Runa Master</h3>
                    <p>Em breve...</p>
                </div>
            </div>
        </main>

        <footer>
            <div class="nav-bar">
                <button class="nav-btn active">
                    <svg width="22" height="22" viewBox="0 0 24 24"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                    <span>Início</span>
                </button>
                <div class="nav-divider"></div>
                <button class="nav-btn">
                    <svg width="22" height="22" viewBox="0 0 24 24"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"></path><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"></path><path d="M4 22h16"></path><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"></path><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"></path><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"></path></svg>
                    <span>Recordes</span>
                </button>
            </div>
        </footer>
    </div>

    <script>
        // Gerar Partículas
        const particlesContainer = document.getElementById('particles');
        const colors = ['#00ffff', '#ff107a', '#ffd700', '#00ffaa'];

        for (let i = 0; i < 30; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            
            const size = Math.random() * 3 + 1;
            const left = Math.random() * 100;
            const duration = Math.random() * 12 + 8;
            const delay = Math.random() * 5;
            const color = colors[Math.floor(Math.random() * colors.length)];

            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;
            particle.style.left = `${left}vw`;
            particle.style.backgroundColor = color;
            particle.style.boxShadow = `0 0 8px ${color}, 0 0 15px ${color}`;
            particle.style.animationDuration = `${duration}s`;
            particle.style.animationDelay = `${delay}s`;

            particlesContainer.appendChild(particle);
        }

        // Lógica do Jogo
        function startMagicBroke() {
            alert("Iniciando Magic Broke...");
        }
    </script>
</body>
</html>
