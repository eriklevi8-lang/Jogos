<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Poção Mix</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --pixel-border: 4px;
            --color-bg: #3b3b3b;
            --color-bg-dark: #2b2b2b;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'VT323', monospace;
            background: var(--color-bg);
            background-image: 
                linear-gradient(45deg, var(--color-bg-dark) 25%, transparent 25%, transparent 75%, var(--color-bg-dark) 75%, var(--color-bg-dark)),
                linear-gradient(45deg, var(--color-bg-dark) 25%, transparent 25%, transparent 75%, var(--color-bg-dark) 75%, var(--color-bg-dark));
            background-size: 32px 32px;
            background-position: 0 0, 16px 16px;
            color: white;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            text-transform: uppercase;
        }

        .pixel-box {
            background: #7d7d7d;
            border: var(--pixel-border) solid black;
            box-shadow: 
                inset calc(var(--pixel-border) * -1) calc(var(--pixel-border) * -1) 0px rgba(0,0,0,0.5),
                inset var(--pixel-border) var(--pixel-border) 0px rgba(255,255,255,0.4);
        }

        .game-header {
            padding: 1.5rem 1rem 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .title {
            font-size: 2.5rem;
            color: #00ffaa;
            text-shadow: 3px 3px 0 #000;
            margin: 0;
        }

        .icon-btn {
            background: #7d7d7d;
            border: 3px solid black;
            box-shadow: inset -3px -3px 0px rgba(0,0,0,0.5), inset 3px 3px 0px rgba(255,255,255,0.4);
            width: 48px; height: 48px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .icon-btn:active { 
            transform: scale(0.95);
            box-shadow: inset 3px 3px 0px rgba(0,0,0,0.5), inset -3px -3px 0px rgba(255,255,255,0.2);
        }

        .game-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
        }

        .stats-board {
            display: flex;
            justify-content: space-around;
            padding: 0.5rem 1rem;
            margin: 0.5rem 1rem;
            align-items: center;
            background: #5c3a21;
            border: 4px solid #3d2412;
            box-shadow: inset -4px -4px 0px rgba(0,0,0,0.5), inset 4px 4px 0px rgba(255,255,255,0.2);
        }
        
        .stat-box { display: flex; flex-direction: column; align-items: center; }
        .stat-label { font-size: 1.2rem; color: #a8e6cf; text-shadow: 2px 2px 0 #000; }
        .stat-value { font-size: 2rem; color: white; text-shadow: 2px 2px 0 #000; }

        .board-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.5rem;
            position: relative;
        }

        .game-board {
            background: #2b2b2b;
            border: 6px solid #1a1a1a;
            box-shadow: 
                inset 6px 6px 0px rgba(0,0,0,0.6),
                inset -6px -6px 0px rgba(255,255,255,0.1),
                0 10px 20px rgba(0,0,0,0.8);
            position: relative;
            image-rendering: pixelated;
        }

        .controls-wrapper {
            padding: 10px 1rem 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .control-btn {
            background: #7d7d7d;
            border: 4px solid black;
            box-shadow: inset -4px -4px 0px rgba(0,0,0,0.5), inset 4px 4px 0px rgba(255,255,255,0.4);
            color: white;
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
            border-radius: 8px;
            transition: transform 0.05s;
        }
        .control-btn.active-btn {
            background: #9e9e9e;
            box-shadow: inset 4px 4px 0px rgba(0,0,0,0.5), inset -4px -4px 0px rgba(255,255,255,0.2);
            transform: scale(0.95);
        }
        .d-pad {
            display: grid;
            grid-template-columns: 65px 65px 65px;
            grid-template-rows: 65px 65px;
            gap: 5px;
        }
        .action-pad {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #btn-action {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            font-size: 2.5rem;
            background: #4caf50;
        }
        #btn-action:active {
            background: #388e3c;
        }

        /* Modal */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }
        .modal.visible { opacity: 1; pointer-events: auto; }
        .modal-content {
            background: #5c3a21;
            border: 6px solid black;
            box-shadow: inset -6px -6px 0px rgba(0,0,0,0.5), inset 6px 6px 0px rgba(255,255,255,0.4), 0 10px 40px rgba(0,0,0,1);
            padding: 2.5rem 2rem;
            text-align: center;
            max-width: 90%;
            width: 360px;
        }
        .modal-content h2 { font-size: 3rem; margin-bottom: 1rem; color: #00ffaa; text-shadow: 3px 3px 0 #000; }
        .modal-content p { font-size: 1.5rem; margin-bottom: 2rem; color: white; text-shadow: 2px 2px 0 #000; }

        .primary-btn {
            background: #4caf50;
            color: white;
            font-family: 'VT323', monospace;
            font-size: 1.8rem;
            padding: 0.8rem 2rem;
            border: 4px solid black;
            box-shadow: inset -4px -4px 0px rgba(0,0,0,0.5), inset 4px 4px 0px rgba(255,255,255,0.4);
            cursor: pointer;
            width: 100%;
        }
        .primary-btn:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div class="game-container">
        <header class="game-header">
            <button class="icon-btn" onclick="goBack()">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="4" stroke-linecap="square"/></svg>
            </button>
            <h1 class="title">Poção Mix</h1>
            <div style="width:48px"></div>
        </header>
        
        <div class="stats-board">
            <div class="stat-box">
                <span class="stat-label">Pontos</span>
                <span class="stat-value" id="score">0</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">Linhas</span>
                <span class="stat-value" id="lines">0</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">Nível</span>
                <span class="stat-value" id="level">1</span>
            </div>
        </div>

        <div class="board-wrapper">
            <canvas id="tetris" width="200" height="400" class="game-board"></canvas>
        </div>

        <div class="controls-wrapper" style="justify-content: flex-end;">
            <div class="action-pad">
                <div class="control-btn" id="btn-rotate" style="width: 90px; height: 90px; border-radius: 50%; background: #4caf50; font-size: 3rem; margin-top: 10px;">↻</div>
            </div>
        </div>
    </div>
    
    <div id="modal" class="modal">
        <div class="modal-content">
            <h2 id="modal-title">Fim de Jogo</h2>
            <p id="modal-desc">Você fez 0 pontos.</p>
            <button class="primary-btn mt-4" onclick="initGame()">Jogar Novamente</button>
        </div>
    </div>

    <script>
        
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        // Guard against direct access
        const unlocked = parseInt(localStorage.getItem('craftMatchMaxLevel') || '1');
        if (unlocked < 5) {
            window.location.href = '/';
        }

        const SoundFX = {
            init() {
                if(audioCtx.state === 'suspended') audioCtx.resume().catch(()=>{});
            },
            playTone(freq, type, duration, vol=0.1) {
                try {
                    this.init();
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start();
                    osc.stop(audioCtx.currentTime + duration);
                } catch(e){}
            },
            playNoise(duration, vol=0.2) {
                try {
                    this.init();
                    const bufferSize = audioCtx.sampleRate * duration;
                    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                    const data = buffer.getChannelData(0);
                    for(let i=0; i<bufferSize; i++) data[i] = Math.random() * 2 - 1;
                    const noise = audioCtx.createBufferSource();
                    noise.buffer = buffer;
                    const gain = audioCtx.createGain();
                    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
                    noise.connect(gain);
                    gain.connect(audioCtx.destination);
                    noise.start();
                } catch(e){}
            },
            click() { this.playTone(800, 'sine', 0.05, 0.1); },
            move() { this.playTone(400, 'triangle', 0.05, 0.1); },
            rotate() { this.playTone(600, 'square', 0.05, 0.1); },
            drop() { this.playTone(200, 'sawtooth', 0.1, 0.2); },
            clear() { 
                this.playTone(600, 'square', 0.1, 0.1); 
                setTimeout(()=>this.playTone(800, 'square', 0.15, 0.1), 100); 
            },
            gameover() {
                this.playNoise(0.8, 0.5);
                this.playTone(150, 'sawtooth', 0.8, 0.3);
            }
        };

        function goBack() {
            SoundFX.click();
            setTimeout(() => { window.location.href = '/'; }, 100);
        }

        const canvas = document.getElementById('tetris');
        const ctx = canvas.getContext('2d');
        
        // Auto scale canvas to fit screen
        function resize() {
            const wrapper = document.querySelector('.board-wrapper');
            const w = wrapper.clientWidth - 20;
            const h = wrapper.clientHeight - 20;
            const ratio = 10 / 20;
            let canvasW = w;
            let canvasH = w / ratio;
            if (canvasH > h) {
                canvasH = h;
                canvasW = h * ratio;
            }
            canvas.style.width = canvasW + 'px';
            canvas.style.height = canvasH + 'px';
        }
        window.addEventListener('resize', resize);
        resize();

        ctx.scale(20, 20); // 200/10 = 20

        function createMatrix(w, h) {
            const matrix = [];
            while (h--) {
                matrix.push(new Array(w).fill(0));
            }
            return matrix;
        }

        const arena = createMatrix(10, 20);

        function drawMatrix(matrix, offset) {
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        ctx.fillStyle = colors[value];
                        ctx.fillRect(x + offset.x, y + offset.y, 1, 1);
                        // Pixel art border effect
                        ctx.fillStyle = 'rgba(0,0,0,0.4)';
                        ctx.fillRect(x + offset.x, y + offset.y + 0.8, 1, 0.2);
                        ctx.fillRect(x + offset.x + 0.8, y + offset.y, 0.2, 1);
                        ctx.fillStyle = 'rgba(255,255,255,0.3)';
                        ctx.fillRect(x + offset.x, y + offset.y, 1, 0.2);
                        ctx.fillRect(x + offset.x, y + offset.y, 0.2, 1);
                    }
                });
            });
        }

        function draw() {
            ctx.fillStyle = '#2b2b2b';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            drawMatrix(arena, {x: 0, y: 0});
            drawMatrix(player.matrix, player.pos);
        }

        function merge(arena, player) {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        arena[y + player.pos.y][x + player.pos.x] = value;
                    }
                });
            });
        }

        function collide(arena, player) {
            const m = player.matrix;
            const o = player.pos;
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 &&
                       (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) {
                        return true;
                    }
                }
            }
            return false;
        }

        function rotate(matrix, dir) {
            for (let y = 0; y < matrix.length; ++y) {
                for (let x = 0; x < y; ++x) {
                    [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
                }
            }
            if (dir > 0) {
                matrix.forEach(row => row.reverse());
            } else {
                matrix.reverse();
            }
        }

        function playerDrop() {
            player.pos.y++;
            if (collide(arena, player)) {
                player.pos.y--;
                merge(arena, player);
                playerReset();
                arenaSweep();
                updateScore();
                SoundFX.drop();
            }
            dropCounter = 0;
        }

        function playerMove(offset) {
            player.pos.x += offset;
            if (collide(arena, player)) {
                player.pos.x -= offset;
            } else {
                SoundFX.move();
            }
        }

        function playerRotate(dir) {
            const pos = player.pos.x;
            let offset = 1;
            rotate(player.matrix, dir);
            while (collide(arena, player)) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > player.matrix[0].length) {
                    rotate(player.matrix, -dir);
                    player.pos.x = pos;
                    return;
                }
            }
            SoundFX.rotate();
        }

        function createPiece(type) {
            if (type === 'T') return [[0,0,0],[1,1,1],[0,1,0]];
            if (type === 'O') return [[2,2],[2,2]];
            if (type === 'L') return [[0,3,0],[0,3,0],[0,3,3]];
            if (type === 'J') return [[0,4,0],[0,4,0],[4,4,0]];
            if (type === 'I') return [[0,5,0,0],[0,5,0,0],[0,5,0,0],[0,5,0,0]];
            if (type === 'S') return [[0,6,6],[6,6,0],[0,0,0]];
            if (type === 'Z') return [[7,7,0],[0,7,7],[0,0,0]];
        }

        const colors = [
            null,
            '#9c27b0', // T
            '#ffd700', // O
            '#ff9800', // L
            '#2196f3', // J
            '#00ffff', // I
            '#4caf50', // S
            '#f44336'  // Z
        ];

        function playerReset() {
            const pieces = 'ILJOTSZ';
            player.matrix = createPiece(pieces[pieces.length * Math.random() | 0]);
            player.pos.y = 0;
            player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
            
            if (collide(arena, player)) {
                SoundFX.gameover();
                document.getElementById('modal-desc').innerText = `Você fez ${player.score} pontos.`;
                document.getElementById('modal').classList.add('visible');
                isGameOver = true;
            }
        }

        function arenaSweep() {
            let rowCount = 1;
            let cleared = 0;
            outer: for (let y = arena.length - 1; y >= 0; --y) {
                for (let x = 0; x < arena[y].length; ++x) {
                    if (arena[y][x] === 0) continue outer;
                }
                const row = arena.splice(y, 1)[0].fill(0);
                arena.unshift(row);
                ++y;
                player.score += rowCount * 10;
                player.lines += 1;
                rowCount *= 2;
                cleared++;
            }
            if (cleared > 0) {
                SoundFX.clear();
                player.level = Math.floor(player.lines / 10) + 1;
                dropInterval = Math.max(100, 1000 - (player.level - 1) * 100);
            }
        }

        let dropCounter = 0;
        let dropInterval = 1000;
        let lastTime = 0;
        let isGameOver = false;

        function update(time = 0) {
            if (isGameOver) return;
            const deltaTime = time - lastTime;
            lastTime = time;
            dropCounter += deltaTime;
            if (dropCounter > dropInterval) {
                playerDrop();
            }
            draw();
            requestAnimationFrame(update);
        }

        function updateScore() {
            document.getElementById('score').innerText = player.score;
            document.getElementById('lines').innerText = player.lines;
            document.getElementById('level').innerText = player.level;
        }

        const player = {
            pos: {x: 0, y: 0},
            matrix: null,
            score: 0,
            lines: 0,
            level: 1
        };

        function initGame() {
            SoundFX.click();
            arena.forEach(row => row.fill(0));
            player.score = 0;
            player.lines = 0;
            player.level = 1;
            dropInterval = 1000;
            isGameOver = false;
            document.getElementById('modal').classList.remove('visible');
            playerReset();
            updateScore();
            lastTime = performance.now();
            update();
        }

        // Controls
        document.addEventListener('keydown', event => {
            if (isGameOver) return;
            if (event.keyCode === 37) playerMove(-1);
            else if (event.keyCode === 39) playerMove(1);
            else if (event.keyCode === 40) playerDrop();
            else if (event.keyCode === 38) playerRotate(1);
        });

        // Touch controls
        let dragStartX = 0;
        let dragStartY = 0;
        let lastDragX = 0;
        let lastDragY = 0;
        let hasDragged = false;
        const DRAG_THRESHOLD_X = 25;
        const DRAG_THRESHOLD_Y = 25;

        canvas.addEventListener('touchstart', e => {
            if (isGameOver) return;
            dragStartX = e.touches[0].clientX;
            dragStartY = e.touches[0].clientY;
            lastDragX = dragStartX;
            lastDragY = dragStartY;
            hasDragged = false;
        }, {passive: false});

        canvas.addEventListener('touchmove', e => {
            if (isGameOver) return;
            e.preventDefault();
            const currentX = e.touches[0].clientX;
            const currentY = e.touches[0].clientY;

            const dx = currentX - lastDragX;
            const dy = currentY - lastDragY;

            if (Math.abs(currentX - dragStartX) > 10 || Math.abs(currentY - dragStartY) > 10) {
                hasDragged = true;
            }

            if (Math.abs(dx) > DRAG_THRESHOLD_X) {
                playerMove(dx > 0 ? 1 : -1);
                lastDragX = currentX;
            }

            if (dy > DRAG_THRESHOLD_Y) {
                playerDrop();
                lastDragY = currentY;
            }
        }, {passive: false});
        
        canvas.addEventListener('touchend', e => {
            if (isGameOver) return;
            if (!hasDragged) {
                playerRotate(1);
            }
        }, {passive: false});

        // Desktop drag support
        let isMouseDown = false;
        canvas.addEventListener('mousedown', e => {
            if (isGameOver) return;
            isMouseDown = true;
            dragStartX = e.clientX;
            dragStartY = e.clientY;
            lastDragX = dragStartX;
            lastDragY = dragStartY;
            hasDragged = false;
        });
        
        window.addEventListener('mouseup', (e) => {
            if (isGameOver) return;
            if (isMouseDown && !hasDragged && e.target === canvas) {
                playerRotate(1);
            }
            isMouseDown = false;
        });
        
        canvas.addEventListener('mousemove', e => {
            if (isGameOver || !isMouseDown) return;
            
            const currentX = e.clientX;
            const currentY = e.clientY;

            if (Math.abs(currentX - dragStartX) > 10 || Math.abs(currentY - dragStartY) > 10) {
                hasDragged = true;
            }

            const dx = currentX - lastDragX;
            const dy = currentY - lastDragY;

            if (Math.abs(dx) > DRAG_THRESHOLD_X) {
                playerMove(dx > 0 ? 1 : -1);
                lastDragX = currentX;
            }

            if (dy > DRAG_THRESHOLD_Y) {
                playerDrop();
                lastDragY = currentY;
            }
        });

        const btnRotate = document.getElementById('btn-rotate');
        if (btnRotate) {
            btnRotate.addEventListener('touchstart', (e) => {
                if (e.cancelable) e.preventDefault();
                btnRotate.classList.add('active-btn');
                if(!isGameOver) playerRotate(1);
            }, {passive: false});
            const stopRotate = (e) => {
                if (e.cancelable) e.preventDefault();
                btnRotate.classList.remove('active-btn');
            };
            btnRotate.addEventListener('touchend', stopRotate, {passive: false});
            btnRotate.addEventListener('touchcancel', stopRotate, {passive: false});
            
            btnRotate.addEventListener('mousedown', (e) => {
                btnRotate.classList.add('active-btn');
                if(!isGameOver) playerRotate(1);
            });
            btnRotate.addEventListener('mouseup', () => btnRotate.classList.remove('active-btn'));
            btnRotate.addEventListener('mouseleave', () => btnRotate.classList.remove('active-btn'));
        }

        initGame();
    </script>
</body>
</html>
