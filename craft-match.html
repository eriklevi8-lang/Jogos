<!DOCTYPE html>
<html lang="pt-BR" style="background-color: black;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0d0f1a">
    <title>Craft Match</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050508;
            --panel-bg: rgba(25, 25, 35, 0.7);
            --border-color: rgba(255, 255, 255, 0.1);
            --accent: #00f2fe;
            --text-main: #f0f0f0;
            --text-muted: #a0a0b0;
            --board-bg: #0b0c10;
            --cell-bg: #13151c;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-color);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(20, 20, 40, 0.8), transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(10, 40, 40, 0.8), transparent 40%);
            color: var(--text-main);
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .game-header {
            padding: 1.5rem 1.5rem 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 20;
        }

        .title {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(to right, #00f2fe 0%, #4facfe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .icon-btn {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
            border-radius: 50%;
            width: 44px; height: 44px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .icon-btn:active { 
            transform: scale(0.9);
            background: rgba(255,255,255,0.15);
        }

        .game-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
            position: relative;
            z-index: 10;
        }

        .stats-panel {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 1.2rem;
            margin: 0.5rem 1.5rem;
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .stats-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stat-group {
            display: flex;
            flex-direction: column;
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 800;
            line-height: 1.1;
        }

        .progress-container {
            width: 100%;
            background: rgba(0,0,0,0.4);
            border-radius: 10px;
            height: 8px;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: var(--accent);
            border-radius: 10px;
            transition: width 0.4s ease-out;
            box-shadow: 0 0 10px var(--accent);
        }

        .board-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            gap: 4px;
            background: var(--board-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 8px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            width: 100%;
            max-width: 420px;
            aspect-ratio: 1;
            position: relative;
            touch-action: none;
        }

        .cell {
            width: 100%;
            height: 100%;
            background: var(--cell-bg);
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.03);
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
        }

        .piece {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(24px, 8vw, 36px);
            user-select: none;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), 
                        top 0.25s ease-in-out, 
                        left 0.25s ease-in-out, 
                        opacity 0.2s ease;
            z-index: 10;
            cursor: pointer;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
        }

        .piece.selected {
            transform: scale(1.15) translateY(-2px);
            filter: drop-shadow(0 0 12px rgba(255,255,255,0.5));
            z-index: 20;
        }

        .piece.combo {
            animation: pulseCombo 0.3s ease;
        }

        @keyframes pulseCombo {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); filter: brightness(1.5) drop-shadow(0 0 20px #fff); }
            100% { transform: scale(0); opacity: 0; }
        }

        /* Specials */
        .piece[data-special="crafting_table"] { filter: drop-shadow(0 0 12px #facc15); }
        .piece[data-special="pickaxe_row"] { filter: drop-shadow(0 0 12px #38bdf8); }
        .piece[data-special="pickaxe_col"] { filter: drop-shadow(0 0 12px #38bdf8); }
        .piece[data-special="enchanting_table"] { filter: drop-shadow(0 0 15px #c084fc); }
        .piece[data-special="tnt"] {
            filter: drop-shadow(0 0 15px #fb7185);
            animation: tntPulse 1.5s infinite alternate;
        }

        @keyframes tntPulse {
            0% { filter: drop-shadow(0 0 10px #fb7185) brightness(1); }
            100% { filter: drop-shadow(0 0 25px #f43f5e) brightness(1.2); transform: scale(1.05); }
        }

        .explosion {
            position: absolute;
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, #fff 10%, #38bdf8 40%, transparent 70%);
            border-radius: 50%;
            transform: translate(-50%, -50%) scale(0);
            animation: explodeAnim 0.4s ease-out forwards;
            pointer-events: none;
            z-index: 50;
            mix-blend-mode: screen;
        }

        @keyframes explodeAnim {
            0% { transform: translate(-50%, -50%) scale(0.2); opacity: 1; }
            50% { opacity: 0.8; }
            100% { transform: translate(-50%, -50%) scale(2.5); opacity: 0; }
        }

        .shake {
            animation: shakeAnim 0.3s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
        }

        @keyframes shakeAnim {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(3px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-5px, 0, 0); }
            40%, 60% { transform: translate3d(5px, 0, 0); }
        }

        /* Modal */
        .modal {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(5px);
            z-index: 100;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .modal.visible { opacity: 1; pointer-events: auto; }
        
        .modal-content {
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 2.5rem 2rem;
            text-align: center;
            max-width: 90%;
            width: 320px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            transform: translateY(20px);
            transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .modal.visible .modal-content {
            transform: translateY(0);
        }

        .modal-title {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            font-weight: 800;
            background: linear-gradient(to right, #00f2fe 0%, #4facfe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .modal-desc {
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }

        .primary-btn {
            background: white;
            color: black;
            border: none;
            padding: 1rem 2rem;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 30px;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .primary-btn:active { 
            transform: scale(0.95);
        }

        .floating-text {
            position: absolute;
            color: white;
            font-weight: 800;
            font-size: 1.2rem;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
            pointer-events: none;
            z-index: 60;
            animation: floatUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.8); opacity: 1; }
            50% { transform: translateY(-20px) scale(1.2); opacity: 1; }
            100% { transform: translateY(-40px) scale(1); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <header class="game-header">
            <button class="icon-btn" onclick="goBack()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <div style="display:flex; flex-direction: column; align-items: center;">
                <h1 class="title">Craft Match</h1>
                <span id="level-name" style="font-size: 0.75rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 2px;">Nível 1 - Floresta Negra</span>
            </div>
            <div style="width:44px"></div>
        </header>

        <div class="stats-panel">
            <div class="stats-row">
                <div class="stat-group">
                    <span class="stat-label">Movimentos</span>
                    <span class="stat-value" id="moves">20</span>
                </div>
                <div class="stat-group" style="align-items: flex-end;">
                    <span class="stat-label">Pontuação</span>
                    <span class="stat-value" id="score">0</span>
                </div>
            </div>
            
            <div style="display:flex; flex-direction: column; gap: 8px;">
                <div style="display:flex; justify-content: space-between;">
                    <span class="stat-label" id="level-label">Nível 1</span>
                    <span class="stat-label" id="goal-text" style="color:white;">0 / 1000</span>
                </div>
                <div class="progress-container">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
            </div>
        </div>

        <div class="board-wrapper">
            <div class="game-board" id="board">
                <!-- Cells generated by JS -->
            </div>
        </div>
    </div>

    <!-- Modals -->
    <div id="gameover-modal" class="modal">
        <div class="modal-content">
            <h2 class="modal-title">Fim de Jogo</h2>
            <p class="modal-desc" id="final-score">Pontuação: 0</p>
            <button class="primary-btn" onclick="initGame()">Tentar Novamente</button>
        </div>
    </div>
    
    <div id="victory-modal" class="modal">
        <div class="modal-content">
            <h2 class="modal-title" style="background: linear-gradient(to right, #f59e0b, #fbbf24); -webkit-background-clip: text;">Vitória!</h2>
            <p class="modal-desc">Você completou o nível.</p>
            <button class="primary-btn" onclick="nextLevel()">Próximo Nível</button>
        </div>
    </div>

    <script>
        function goBack() { window.location.href = '/'; }
        
        function nextLevel() {
            let currentLevel = parseInt(localStorage.getItem('craftMatchMaxLevel') || '1');
            localStorage.setItem('craftMatchMaxLevel', currentLevel + 1);
            initGame();
        }

        // Audio synthesizer
        const SoundFX = {
            playTone: (freq, type, duration, vol=0.1) => {
                try {
                    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(freq/2, audioCtx.currentTime + duration);
                    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start();
                    osc.stop(audioCtx.currentTime + duration);
                } catch(e) {}
            },
            swap: () => SoundFX.playTone(600, 'sine', 0.1, 0.02),
            match: () => SoundFX.playTone(800, 'triangle', 0.15, 0.05),
            special: () => SoundFX.playTone(1200, 'sine', 0.3, 0.1),
            explosion: () => SoundFX.playTone(150, 'square', 0.5, 0.15),
            win: () => SoundFX.playTone(1000, 'sine', 0.5, 0.1),
            lose: () => SoundFX.playTone(200, 'sawtooth', 0.8, 0.1)
        };

        const boardEl = document.getElementById('board');
        const COLS = 8, ROWS = 8;
        
        const LEVELS = [
            { bg: '#050508', panel: 'rgba(25, 25, 35, 0.7)', boardBg: '#0b0c10', cellBg: '#13151c', accent: '#00f2fe', items: ['🍄', '🧪', '💎', '🌙', '🔮', '💀'], goal: 1000, moves: 20, name: 'Floresta Negra' },
            { bg: '#1a0b1c', panel: 'rgba(35, 15, 35, 0.7)', boardBg: '#2a112c', cellBg: '#3a183d', accent: '#b026ff', items: ['✨', '🩸', '👁️', '🦷', '🕷️', '🕸️'], goal: 1500, moves: 25, name: 'Caverna de Sangue' },
            { bg: '#0b1c1a', panel: 'rgba(15, 35, 30, 0.7)', boardBg: '#112c2a', cellBg: '#183d3a', accent: '#00ffaa', items: ['🔱', '🌊', '⚓', '🐠', '🐚', '🐙'], goal: 2000, moves: 25, name: 'Ruínas Submersas' },
            { bg: '#1c0b0b', panel: 'rgba(35, 15, 15, 0.7)', boardBg: '#2c1111', cellBg: '#3d1818', accent: '#ff4444', items: ['🔥', '🌋', '☄️', '👺', '👹', '🦴'], goal: 2500, moves: 30, name: 'Vulcão Adormecido' },
            { bg: '#1c1a0b', panel: 'rgba(35, 30, 15, 0.7)', boardBg: '#2c2a11', cellBg: '#3d3a18', accent: '#ffaa00', items: ['👑', '🐉', '⚔️', '🛡️', '📜', '🕯️'], goal: 3500, moves: 30, name: 'Templo Dourado' }
        ];
        
        let ITEMS = LEVELS[0].items;
        
        const SPECIALS = {
            CRAFTING: 'crafting_table',     // clears same color (Icon: 📚)
            ROW: 'pickaxe_row',             // clears row (Icon: ⚡)
            COL: 'pickaxe_col',             // clears col (Icon: ☄️)
            BOMB: 'tnt',                    // 3x3 explosion (Icon: 💥)
            CROSS: 'enchanting_table'       // row + col (Icon: 🌟)
        };

        const SPECIAL_ICONS = {
            [SPECIALS.CRAFTING]: '📚',
            [SPECIALS.ROW]: '⚡',
            [SPECIALS.COL]: '☄️',
            [SPECIALS.BOMB]: '💥',
            [SPECIALS.CROSS]: '🌟'
        };

        let grid = [];
        let selected = null;
        let isProcessing = false;
        
        let score = 0;
        let moves = 20;
        let goal = 1000;
        let level = 1;

        function updateStats() {
            document.getElementById('score').innerText = score;
            document.getElementById('moves').innerText = moves;
            document.getElementById('goal-text').innerText = `${score} / ${goal}`;
            
            const progress = Math.min(100, (score / goal) * 100);
            document.getElementById('progress-fill').style.width = `${progress}%`;
        }

        function spawnFloatingText(text, x, y, color = '#fff') {
            const el = document.createElement('div');
            el.className = 'floating-text';
            el.innerText = text;
            el.style.left = `${x}px`;
            el.style.top = `${y}px`;
            if(color) el.style.color = color;
            boardEl.appendChild(el);
            setTimeout(() => el.remove(), 1000);
        }

        function createGrid() {
            boardEl.innerHTML = '';
            grid = [];
            for (let r = 0; r < ROWS; r++) {
                let row = [];
                for (let c = 0; c < COLS; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    boardEl.appendChild(cell);
                    row.push(null);
                }
                grid.push(row);
            }
            fillGrid(true);
        }

        function getCellPos(r, c) {
            return {
                x: (c / COLS) * 100,
                y: (r / ROWS) * 100
            };
        }

        function getRandomItem() {
            return ITEMS[Math.floor(Math.random() * ITEMS.length)];
        }

        function fillGrid(initial = false) {
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (!grid[r][c]) {
                        let item;
                        do {
                            item = getRandomItem();
                        } while (initial && (
                            (r >= 2 && grid[r-1][c] && grid[r-2][c] && grid[r-1][c].type === item && grid[r-2][c].type === item) ||
                            (c >= 2 && grid[r][c-1] && grid[r][c-2] && grid[r][c-1].type === item && grid[r][c-2].type === item)
                        ));
                        
                        createPiece(r, c, item, null, initial);
                    }
                }
            }
        }

        function createPiece(r, c, type, special = null, initial = false) {
            const piece = document.createElement('div');
            piece.className = 'piece';
            piece.dataset.r = r;
            piece.dataset.c = c;
            
            if (special) {
                piece.dataset.special = special;
                piece.innerText = SPECIAL_ICONS[special];
                piece.type = type; // Keep original type for matching with others (or act as wildcard)
            } else {
                piece.innerText = type;
                piece.type = type;
            }
            
            const pos = getCellPos(r, c);
            if (initial) {
                piece.style.left = `${pos.x}%`;
                piece.style.top = `${pos.y}%`;
            } else {
                piece.style.left = `${pos.x}%`;
                piece.style.top = `-20%`;
                setTimeout(() => piece.style.top = `${pos.y}%`, 50);
            }
            
            boardEl.appendChild(piece);
            
            // Interaction
            const handleInteract = (e) => {
                if (isProcessing) return;
                e.preventDefault();
                selectPiece(parseInt(piece.dataset.r), parseInt(piece.dataset.c));
            };
            
            piece.addEventListener('mousedown', handleInteract);
            piece.addEventListener('touchstart', handleInteract, {passive: false});
            
            grid[r][c] = { el: piece, type, special };
        }

        function selectPiece(r, c) {
            if (selected) {
                const sr = selected.r, sc = selected.c;
                if (sr === r && sc === c) {
                    grid[r][c].el.classList.remove('selected');
                    selected = null;
                } else if (Math.abs(sr - r) + Math.abs(sc - c) === 1) {
                    grid[sr][sc].el.classList.remove('selected');
                    swap(sr, sc, r, c);
                    selected = null;
                } else {
                    grid[sr][sc].el.classList.remove('selected');
                    grid[r][c].el.classList.add('selected');
                    selected = {r, c};
                }
            } else {
                grid[r][c].el.classList.add('selected');
                selected = {r, c};
                SoundFX.playTone(400, 'sine', 0.05, 0.02);
            }
        }

        async function swap(r1, c1, r2, c2) {
            isProcessing = true;
            SoundFX.swap();
            moves--;
            updateStats();
            
            updatePiecePos(r1, c1, r2, c2);
            await sleep(250);
            
            const matches = findMatches();
            if (matches.length > 0) {
                await processMatches(matches);
            } else {
                // Swap back
                SoundFX.swap();
                updatePiecePos(r1, c1, r2, c2);
                await sleep(250);
                moves++; // Undo move count if invalid
                updateStats();
                isProcessing = false;
            }
        }

        function updatePiecePos(r1, c1, r2, c2) {
            const p1 = grid[r1][c1];
            const p2 = grid[r2][c2];
            
            grid[r1][c1] = p2;
            grid[r2][c2] = p1;
            
            p1.el.dataset.r = r2; p1.el.dataset.c = c2;
            p2.el.dataset.r = r1; p2.el.dataset.c = c1;
            
            const pos1 = getCellPos(r2, c2);
            const pos2 = getCellPos(r1, c1);
            
            p1.el.style.top = `${pos1.y}%`; p1.el.style.left = `${pos1.x}%`;
            p2.el.style.top = `${pos2.y}%`; p2.el.style.left = `${pos2.x}%`;
        }

        function findMatches() {
            let matched = new Set();
            let matchGroups = [];
            
            // Horizontal
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS - 2; c++) {
                    const p1 = grid[r][c], p2 = grid[r][c+1], p3 = grid[r][c+2];
                    if (p1 && p2 && p3 && p1.type === p2.type && p2.type === p3.type) {
                        let group = [`${r},${c}`, `${r},${c+1}`, `${r},${c+2}`];
                        let len = 3;
                        while(c + len < COLS && grid[r][c+len] && grid[r][c+len].type === p1.type) {
                            group.push(`${r},${c+len}`);
                            len++;
                        }
                        group.forEach(id => matched.add(id));
                        matchGroups.push({ type: 'horiz', cells: group, pieceType: p1.type });
                        c += len - 1;
                    }
                }
            }
            
            // Vertical
            for (let c = 0; c < COLS; c++) {
                for (let r = 0; r < ROWS - 2; r++) {
                    const p1 = grid[r][c], p2 = grid[r+1][c], p3 = grid[r+2][c];
                    if (p1 && p2 && p3 && p1.type === p2.type && p2.type === p3.type) {
                        let group = [`${r},${c}`, `${r+1},${c}`, `${r+2},${c}`];
                        let len = 3;
                        while(r + len < ROWS && grid[r+len][c] && grid[r+len][c].type === p1.type) {
                            group.push(`${r+len},${c}`);
                            len++;
                        }
                        group.forEach(id => matched.add(id));
                        matchGroups.push({ type: 'vert', cells: group, pieceType: p1.type });
                        r += len - 1;
                    }
                }
            }
            
            // 2x2 Squares
            for (let r = 0; r < ROWS - 1; r++) {
                for (let c = 0; c < COLS - 1; c++) {
                    const p1 = grid[r][c], p2 = grid[r][c+1], p3 = grid[r+1][c], p4 = grid[r+1][c+1];
                    if (p1 && p2 && p3 && p4 && 
                        p1.type === p2.type && p2.type === p3.type && p3.type === p4.type) {
                        let group = [`${r},${c}`, `${r},${c+1}`, `${r+1},${c}`, `${r+1},${c+1}`];
                        group.forEach(id => matched.add(id));
                        matchGroups.push({ type: 'square', cells: group, pieceType: p1.type });
                    }
                }
            }
            
            return Array.from(matched);
        }

        async function processMatches(matches, combo = 1) {
            if (matches.length === 0) {
                if (score >= goal) {
                    SoundFX.win();
                    document.getElementById('victory-modal').classList.add('visible');
                } else if (moves <= 0) {
                    SoundFX.lose();
                    document.getElementById('final-score').innerText = `Pontuação: ${score}`;
                    document.getElementById('gameover-modal').classList.add('visible');
                } else {
                    isProcessing = false;
                }
                return;
            }
            
            SoundFX.match();
            document.getElementById('board').classList.add('shake');
            setTimeout(() => document.getElementById('board').classList.remove('shake'), 300);

            let pts = matches.length * 10 * combo;
            score += pts;
            updateStats();
            
            // Check for specials in the match
            let toDestroy = new Set(matches);
            let specialsTriggered = [];
            
            matches.forEach(id => {
                const [r, c] = id.split(',').map(Number);
                const p = grid[r][c];
                if (p && p.special) {
                    specialsTriggered.push({r, c, special: p.special, type: p.type});
                }
            });

            // Process specials recursively (simplified)
            specialsTriggered.forEach(sp => {
                SoundFX.special();
                if (sp.special === SPECIALS.ROW) {
                    for(let c=0; c<COLS; c++) toDestroy.add(`${sp.r},${c}`);
                } else if (sp.special === SPECIALS.COL) {
                    for(let r=0; r<ROWS; r++) toDestroy.add(`${r},${sp.c}`);
                } else if (sp.special === SPECIALS.CROSS) {
                    for(let c=0; c<COLS; c++) toDestroy.add(`${sp.r},${c}`);
                    for(let r=0; r<ROWS; r++) toDestroy.add(`${r},${sp.c}`);
                } else if (sp.special === SPECIALS.BOMB) {
                    SoundFX.explosion();
                    for(let r=Math.max(0, sp.r-1); r<=Math.min(ROWS-1, sp.r+1); r++) {
                        for(let c=Math.max(0, sp.c-1); c<=Math.min(COLS-1, sp.c+1); c++) {
                            toDestroy.add(`${r},${c}`);
                        }
                    }
                    createExplosionEffect(sp.r, sp.c);
                } else if (sp.special === SPECIALS.CRAFTING) {
                    for(let r=0; r<ROWS; r++) {
                        for(let c=0; c<COLS; c++) {
                            if(grid[r][c] && grid[r][c].type === sp.type) toDestroy.add(`${r},${c}`);
                        }
                    }
                }
            });

            Array.from(toDestroy).forEach(id => {
                const [r, c] = id.split(',').map(Number);
                const p = grid[r][c];
                if (p) {
                    p.el.classList.add('combo');
                    setTimeout(() => p.el.remove(), 250);
                    grid[r][c] = null;
                }
            });
            
            // Pop text
            const firstMatch = matches[0].split(',');
            const r = parseInt(firstMatch[0]);
            const c = parseInt(firstMatch[1]);
            const rect = boardEl.getBoundingClientRect();
            const cellW = rect.width / COLS;
            spawnFloatingText(`+${pts}`, c * cellW, r * cellW, combo > 1 ? '#00f2fe' : '#fff');

            await sleep(300);
            await fallDown();
            fillGrid();
            await sleep(300);
            
            const newMatches = findMatches();
            processMatches(newMatches, combo + 1);
        }

        function createExplosionEffect(r, c) {
            const el = document.createElement('div');
            el.className = 'explosion';
            const pos = getCellPos(r, c);
            el.style.left = `calc(${pos.x}% + 6.25%)`; // Center offset
            el.style.top = `calc(${pos.y}% + 6.25%)`;
            boardEl.appendChild(el);
            setTimeout(() => el.remove(), 500);
        }

        async function fallDown() {
            let moved = false;
            for (let c = 0; c < COLS; c++) {
                let emptySlots = 0;
                for (let r = ROWS - 1; r >= 0; r--) {
                    if (grid[r][c] === null) {
                        emptySlots++;
                    } else if (emptySlots > 0) {
                        const p = grid[r][c];
                        grid[r + emptySlots][c] = p;
                        grid[r][c] = null;
                        p.el.dataset.r = r + emptySlots;
                        const pos = getCellPos(r + emptySlots, c);
                        p.el.style.top = `${pos.y}%`;
                        moved = true;
                    }
                }
            }
            if(moved) await sleep(250);
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        function initGame() {
            document.querySelectorAll('.modal').forEach(m => m.classList.remove('visible'));
            
            level = parseInt(localStorage.getItem('craftMatchMaxLevel') || '1');
            const levelIdx = Math.min(level - 1, LEVELS.length - 1);
            const levelConfig = LEVELS[levelIdx];
            
            // Apply theme
            document.documentElement.style.setProperty('--bg-color', levelConfig.bg);
            document.documentElement.style.setProperty('--panel-bg', levelConfig.panel);
            document.documentElement.style.setProperty('--board-bg', levelConfig.boardBg);
            document.documentElement.style.setProperty('--cell-bg', levelConfig.cellBg);
            document.documentElement.style.setProperty('--accent', levelConfig.accent);
            
            ITEMS = levelConfig.items;
            document.getElementById('level-name').innerText = `Nível ${level} - ${levelConfig.name}`;
            document.getElementById('level-label').innerText = `Nível ${level}`;
            
            score = 0;
            moves = levelConfig.moves;
            goal = levelConfig.goal;
            updateStats();
            createGrid();
            isProcessing = false;
        }

        initGame();

        // Drag handlers (simplified robust version)
        let isDragging = false;
        let dragStartR, dragStartC;
        let dragStartX, dragStartY;

        boardEl.addEventListener('pointerdown', (e) => {
            if(isProcessing) return;
            const piece = e.target.closest('.piece');
            if(piece) {
                isDragging = true;
                dragStartR = parseInt(piece.dataset.r);
                dragStartC = parseInt(piece.dataset.c);
                dragStartX = e.clientX;
                dragStartY = e.clientY;
                piece.setPointerCapture(e.pointerId);
            }
        });

        boardEl.addEventListener('pointermove', (e) => {
            if(!isDragging || isProcessing) return;
            const dx = e.clientX - dragStartX;
            const dy = e.clientY - dragStartY;
            
            if (Math.abs(dx) > 30 || Math.abs(dy) > 30) {
                isDragging = false;
                let targetR = dragStartR;
                let targetC = dragStartC;
                
                if (Math.abs(dx) > Math.abs(dy)) {
                    targetC += (dx > 0 ? 1 : -1);
                } else {
                    targetR += (dy > 0 ? 1 : -1);
                }
                
                if (targetR >= 0 && targetR < ROWS && targetC >= 0 && targetC < COLS) {
                    swap(dragStartR, dragStartC, targetR, targetC);
                }
            }
        });

        boardEl.addEventListener('pointerup', () => { isDragging = false; });
        boardEl.addEventListener('pointercancel', () => { isDragging = false; });
    </script>
</body>
</html>
